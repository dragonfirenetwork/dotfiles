---
# roles/parsec/tasks/macos.yml

- name: Parsec | Check if already installed
  stat:
    path: "/Applications/Parsec.app"
  register: parsec_installed
  tags:
    - parsec

# No become - Homebrew refuses to run as root.
- name: Parsec | Install via Homebrew Cask
  homebrew_cask:
    name: parsec
    state: present
  when: not parsec_installed.stat.exists
  tags:
    - parsec

- name: Parsec | Add to dock
  set_fact:
    dockitems_persist: "{{ dockitems_persist + [ { 'name': 'Parsec', 'path': '/Applications/Parsec.app', 'pos': '7' } ] }}"
  tags:
    - parsec
