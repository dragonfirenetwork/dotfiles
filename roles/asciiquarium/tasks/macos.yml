---
# roles/asciiquarium/tasks/macos.yml

- name: Install asciiquarium
  homebrew:
    name: asciiquarium
    state: present
  tags:
    - asciiquarium

- name: Add aliases
  lineinfile:
    path: "{{ ansible_facts.env.HOME }}/.zshrc"
    line: |
      # Asciiquarium
      alias brb=asciiquarium
      alias aq=asciiquarium
  tags:
    - asciiquarium