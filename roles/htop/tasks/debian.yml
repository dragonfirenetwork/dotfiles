---
# roles/htop/tasks/debian.yml

- name: Htop | Setup and configure
  block:

    - name: Htop | Install via Apt
      apt:
        name: htop
        state: present

    - name: Htop | Copy configuration file
      copy:
        src: htoprc
        dest: "{{ ansible_env.HOME }}/.config/htop/htoprc"
        owner: "{{ ansible_env.USER }}"
        group: "{{ ansible_env.USER }}"
        mode: '0644'
        directory_mode: '0755'
        force: true

  become: true
  tags:
    - htop
