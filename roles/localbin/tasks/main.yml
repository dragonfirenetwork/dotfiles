---
# roles/localbin/tasks/main.yml
# Portable personal scripts deployed to ~/.local/bin (already on PATH via zsh role).
# OS-agnostic. Note: `glm` needs `baoget` (OpenBao helper) + `claude` present and
# homelab/cluster access to resolve the vaulted GLM key at launch.

- name: localbin | ensure ~/.local/bin exists
  ansible.builtin.file:
    path: "{{ ansible_env.HOME }}/.local/bin"
    state: directory
    mode: "0755"

- name: localbin | install scripts
  ansible.builtin.copy:
    src: "{{ item }}"
    dest: "{{ ansible_env.HOME }}/.local/bin/{{ item }}"
    mode: "0755"
  loop:
    - glm
