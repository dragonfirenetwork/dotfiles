---
# roles/tmux/tasks/macos.yml

- name: Install tmux
  homebrew:
    name: tmux
    state: present
  tags:
    - tmux

- name: Tmux | Ensure config directory exists
  file:
    path: "{{ ansible_facts.env.HOME }}/.config/tmux"
    state: directory
    owner: "{{ ansible_facts.env.USER }}"
    group: "staff"
    mode: 0755
  tags:
    - tmux

- name: Copy tmux configuration
  copy:
    src: tmux.conf
    dest: "{{ ansible_facts.env.HOME }}/.config/tmux"
    mode: 0644
    directory_mode: 0755
    force: true

- name: Copy tmux dev session configuration
  copy:
    src: dev.conf
    dest: "{{ ansible_facts.env.HOME }}/.config/tmux"
    mode: 0644
    directory_mode: 0755
    force: true

- name: Copy tmux dev session launcher script
  copy:
    src: tmux-dev.sh
    dest: "{{ ansible_facts.env.HOME }}/.config/tmux"
    mode: 0755
    directory_mode: 0755
    force: true