---
# roles/tmux/tasks/debian.yml

- name: Tmux | Setup and configure
  block:

    - name: Tmux | Install tmux via Apt
      apt:
        name: tmux
        state: present

    - name: Tmux | Copy tmux configuration
      copy:
        src: tmux.conf
        dest: "{{ ansible_facts.env.HOME }}/.config/tmux"
        mode: '0644'
        directory_mode: '0755'
        force: true

    - name: Tmux | Copy tmux dev session configuration
      copy:
        src: dev.conf
        dest: "{{ ansible_facts.env.HOME }}/.config/tmux"
        mode: '0644'
        directory_mode: '0755'
        force: true

    - name: Tmux | Copy tmux dev session launcher script
      copy:
        src: tmux-dev.sh
        dest: "{{ ansible_facts.env.HOME }}/.config/tmux"
        mode: '0755'
        directory_mode: '0755'
        force: true

  become: true
  tags:
    - tmux