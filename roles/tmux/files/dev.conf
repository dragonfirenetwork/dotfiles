# Create a new session named "dev" if it doesn't exist
new-session -s dev -d

# Window 1: Local Environment
new-window -t dev:1 -n "local"

# Window 2: Project Environment
new-window -t dev:2 -n "projects"

# Window 3: Ansible Server
new-window -t dev:3 -n "ansible"

# Window 4: Monitoring with 4-pane layout
new-window -t dev:4 -n "monitoring"

# Create the 4-pane layout for the monitoring window:
# Pane 1: Top left (slightly wider than pane 2)
# Pane 2: Top right  
# Pane 3: Bottom left (significantly wider than pane 4)
# Pane 4: Bottom right

# Split horizontally first to create top and bottom sections (15% top, 85% bottom)
split-window -v -p 85

# Split the top pane vertically (144x23 left, 111x23 right)
select-pane -t 1
split-window -h -p 37

# Split the bottom pane vertically (191x40left, 64x40 right)  
select-pane -t 3
split-window -h -p 5

# Window 5: Repository Environment
new-window -t dev:5 -n "repo"

# Split horizontally first to create top and bottom sections (50% top, 50% bottom)
split-window -v -p 50

# Split the top pane vertically (50% left, 50% right)
select-pane -t 1
split-window -h -p 50

# Split the bottom pane vertically (50% left, 50% right)
select-pane -t 3
split-window -h -p 50
