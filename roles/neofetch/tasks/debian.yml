---
# roles/neofetch/tasks/debian.yml
# neofetch is discontinued; fastfetch is its actively-maintained successor.
# fastfetch is available in apt on Ubuntu 24.04+ / Debian 13+. The old
# neofetch config.conf is not compatible with fastfetch, so we rely on
# fastfetch's defaults rather than copying the dead config.

- name: Fastfetch | Install via Apt
  block:
    - name: Fastfetch | Install
      apt:
        name: fastfetch
        state: present
      tags:
        - neofetch
        - fastfetch

  become: true
  tags:
    - neofetch
    - fastfetch
