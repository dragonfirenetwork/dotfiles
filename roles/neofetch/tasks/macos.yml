---
# roles/neofetch/tasks/macos.yml
# neofetch is discontinued and was removed from Homebrew core; fastfetch is
# its actively-maintained successor. The old neofetch config.conf is not
# compatible with fastfetch (which uses ~/.config/fastfetch/config.jsonc),
# so we install fastfetch with its sensible defaults and skip the old config.

- name: Fastfetch | Setup and configuration
  block:
    - name: Install fastfetch
      homebrew:
        name: fastfetch
        state: present
  tags:
    - neofetch
    - fastfetch
