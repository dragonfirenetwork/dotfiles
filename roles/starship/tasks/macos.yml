---
# roles/starship/macos.yml

- name: Starship | Install via Homebrew
  homebrew:
    name: starship
    state: present
  tags:
    - starship

- name: Starship | Copy configuration file
  copy:
    src: "starship.toml"
    dest: "{{ ansible_facts.env.HOME }}/.config"
    mode: 0644
    owner: "{{ ansible_facts.env.USER }}"
    group: "staff"
  tags:
    - starship