# Fill Module
[fill]
symbol = ' '

# Character Module
[character]
disabled = false
success_symbol = '[ÔØ»](bold green)'
error_symbol = '[Ô£ù](bold red)'
vimcmd_symbol = '[ÔØ»](bold green)'
vimcmd_replace_one_symbol = '[ÔØ»](bold purple)'
vimcmd_replace_symbol = '[ÔØ»](bold purple)'
vimcmd_visual_symbol = '[ÔØ»](bold yellow)'

# Username settings
[username]
show_always = true
style_root = "bold red"
style_user = "bold yellow"
format = "[$user]($style) "
disabled = false

# Hostname Module
[hostname]
ssh_only = false
format = 'on [$hostname](bold yellow)'
trim_at = "."
disabled = false
ssh_symbol = "¯¼ü "

# Time Module
#[time]
#disabled = false
#time_format = "%R"
#style = "bold fg:purple"
# Removed the 'symbol' key and incorporated the symbol directly into the format string
#format = '[ ´É║ $time ](fg:purple bg:black)'

# Directory Module
[directory]
style = 'bold fg:teal'
# format = '[$path ]($style)'
format = "[$read_only]($read_only_style)[$path]($style) "
truncation_length = 8 # 3
truncation_symbol = 'ÔÇĞ/'
truncate_to_repo = false
read_only = " ¾░î¥"
read_only_style = "red"

[directory.substitutions]
'Documents' = '¾░êÖ'
'Downloads' = '´ÇÖ '
'Music' = '´Çü '
'Pictures' = '´Ç¥ '

# Jobs Module
[jobs]
symbol = '´Çô '
style = 'red'
number_threshold = 1
format = '[$symbol]($style)'

# Command Duration Module
[cmd_duration]
min_time = 100
style = 'fg:yellow'
format = '[´ëÆ $duration]($style)'

# Git Branch Module
[git_branch]
style = 'fg:green'
symbol = "´Éİ "
format = '[on](white) [$symbol$branch ]($style)'

# Git Status Module
[git_status]
style = 'fg:green'
format = '([$all_status$ahead_behind]($style) )'

# Python Module
[python]
style = 'teal'
symbol = "¯êÁ "
format = '[${symbol}${version} (\($virtualenv\) )]($style)'
pyenv_version_name = true
pyenv_prefix = ''

# AWS Module
[aws]
symbol = "¯î¢  "
style = 'yellow'
format = '[$symbol($profile )(\[$duration\] )]($style)'

# Docker Context Module
[docker_context]
symbol = "´îê Docker"
style = 'fg:teal'
format = '[$symbol]($style) $path'
detect_files = ['docker-compose.yml', 'docker-compose.yaml', 'Dockerfile']
detect_extensions = ['Dockerfile']

# OS Module
