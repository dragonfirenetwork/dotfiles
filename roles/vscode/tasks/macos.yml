---
# roles/vscode/tasks/macos.yml

- name: VS Code | Check if VS Code is already installed
  stat:
    path: "/Applications/Visual Studio Code.app"
  register: vscode_installed
  tags:
    - vscode

# NOTE: do NOT use become here - Homebrew refuses to run as root.
- name: VS Code | Initial Installation
  block:
    - name: Install VS Code
      homebrew_cask:
        name: visual-studio-code
        state: present

    - name: Set dock position
      set_fact:
        dockitems_persist: "{{ dockitems_persist + [ { 'name': 'VSCode', 'path': '/Applications/Visual Studio Code.app', 'pos': '6' } ] }}"
  when: not vscode_installed.stat.exists
  tags:
    - vscode

- name: VS Code | Get Homebrew prefix
  command: brew --prefix
  register: vscode_brew_prefix
  changed_when: false
  tags:
    - vscode

# Symlink the bundled CLI into the Homebrew bin dir (on PATH; /opt/homebrew on
# Apple Silicon, /usr/local on Intel - /usr/local/bin may not exist on arm64).
- name: VS Code | Ensure 'code' command is available in PATH
  file:
    src: "/Applications/Visual Studio Code.app/Contents/Resources/app/bin/code"
    dest: "{{ vscode_brew_prefix.stdout }}/bin/code"
    state: link
    force: yes
  tags:
    - vscode
